name: Daily Report

on:
  schedule:
    - cron: '0 9 * * *'  # runs daily at 9 AM
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Get Commits
        id: commits
        run: |
          curl -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          https://api.github.com/repos/UVRAJ1990/codex-automation/commits > commits.json

      - name: Create Report Issue
        run: |
          echo "Creating daily report..."

          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Content-Type: application/json" \
          https://api.github.com/repos/UVRAJ1990/codex-automation/issues \
          -d '{
            "title": "Daily Report",
            "body": "Auto-generated report. (Next step: connect Codex AI)"
          }'
