name: Daily AI Report

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Get commits
        run: |
          curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          https://api.github.com/repos/UVRAJ1990/codex-automation/commits > commits.json

      - name: Prepare commit messages
        run: |
          cat commits.json | jq '.[].commit.message' > messages.txt

      - name: Generate AI Summary
        id: ai
        run: |
          PROMPT=$(cat messages.txt)

          RESPONSE=$(curl -s https://api.openai.com/v1/responses \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4.1-mini\",
              \"input\": \"Summarize these git commits into sections: Features, Fixes, Improvements. Keep it short and clean:\n$PROMPT\"
            }")

          echo "$RESPONSE" | jq -r '.output[0].content[0].text' > summary.txt

      - name: Create GitHub Issue
        run: |
          SUMMARY=$(cat summary.txt)

          curl -s -X POST \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Content-Type: application/json" \
          https://api.github.com/repos/UVRAJ1990/codex-automation/issues \
          -d "{
            \"title\": \"Daily AI Report\",
            \"body\": \"$SUMMARY\"
          }"
