- name: Post to WordPress
  run: |
    CONTENT=$(jq -Rs . < blog.txt)

    RESPONSE=$(curl -s -X POST \
      -u "${{ secrets.WP_USERNAME }}:${{ secrets.WP_PASSWORD }}" \
      -H "Content-Type: application/json" \
      http://freehosting.live/wp-json/wp/v2/posts \
      -d "{
        \"title\": \"Mud Interlock House Guide\",
        \"content\": $CONTENT,
        \"status\": \"publish\"
      }")

    echo "$RESPONSE"
